<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      height: 250px;
      background: #0e0e10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .splash-logo {
      width: 280px;
      height: auto;
      opacity: 0;
      animation: fadeIn 0.4s ease-out forwards;
    }
    .spinner {
      margin-top: 16px;
      width: 36px;
      height: 36px;
      border: 3px solid #222230;
      border-top-color: #008080;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img src="/hype-logo.svg" alt="Hype" class="splash-logo" />
  <div class="spinner"></div>
</body>
</html>
